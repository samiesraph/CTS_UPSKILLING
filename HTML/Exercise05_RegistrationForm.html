<!DOCTYPE html>
<html>
<head>
<style>
form{
    width:400px;
    padding:20px;
    border:1px solid black;
}
</style>

<script>
function showMessage(){
document.getElementById("msg").value =
"Registration Submitted Successfully";
}
</script>

</head>
<body>

<form onsubmit="showMessage();return false;">

Name:
<input type="text" required autofocus placeholder="Enter Name"><br><br>

Email:
<input type="email" required placeholder="Enter Email"><br><br>

Date:
<input type="date" required><br><br>

Event Type:
<select>
<option>Music</option>
<option>Sports</option>
<option>Art</option>
</select><br><br>

Message:
<textarea placeholder="Enter Message"></textarea><br><br>

<input type="submit">

<output id="msg"></output>

</form>

</body>
</html>
