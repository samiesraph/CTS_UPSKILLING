<!DOCTYPE html>
<html>
<head>
<title>Debugging Demo</title>

<script>

let count=0;

function test(){

count++;

console.log("Button Clicked");

console.log("Count = "+count);

}

</script>

</head>
<body>

<h2>Debugging Example</h2>

<button onclick="test()">
Click Me
</button>

<p>
Open Chrome DevTools (F12)
and check Console output.
</p>

</body>
</html>
