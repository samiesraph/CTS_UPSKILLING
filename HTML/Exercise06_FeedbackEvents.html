<!DOCTYPE html>
<html>
<head>

<script>

function validatePhone(){
let phone=document.getElementById("phone").value;

if(phone.length!=10)
alert("Phone must contain 10 digits");
}

function feeDisplay(){
let fee=document.getElementById("event").value;
document.getElementById("fee").innerHTML=fee;
}

function submitMsg(){
alert("Feedback Submitted");
}

function enlarge(img){
img.style.width="300px";
}

function countChars(){
let text=document.getElementById("feedback").value;
document.getElementById("count").innerHTML=text.length;
}

</script>

</head>
<body>

Phone:
<input type="text" id="phone" onblur="validatePhone()">

<br><br>

<select id="event" onchange="feeDisplay()">
<option value="100">Music Event</option>
<option value="200">Sports Event</option>
</select>

<p>Fee: ₹<span id="fee"></span></p>

<img src="event.jpg" width="150"
ondblclick="enlarge(this)">

<br><br>

<textarea id="feedback"
onkeyup="countChars()"></textarea>

<p>Characters: <span id="count">0</span></p>

<button onclick="submitMsg()">Submit</button>

</body>
</html>
