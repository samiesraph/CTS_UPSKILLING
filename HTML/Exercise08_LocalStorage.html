<!DOCTYPE html>
<html>
<head>

<script>

function savePreference(){

let eventType=
document.getElementById("event").value;

localStorage.setItem("eventType",eventType);
}
function loadPreference(){

let saved=
localStorage.getItem("eventType");

if(saved){
document.getElementById("event").value=saved;
}
}

function clearData(){

localStorage.clear();
sessionStorage.clear();

alert("Preferences Cleared");
}

</script>

</head>

<body onload="loadPreference()">

<select id="event" onchange="savePreference()">

<option>Music</option>
<option>Sports</option>
<option>Art</option>

</select>

<br><br>

<button onclick="clearData()">
Clear Preferences
</button>

</body>
</html>
